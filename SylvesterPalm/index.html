<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0d2818;font-family:"DM Sans",sans-serif;color:#ffffff;min-height:100vh;width:100%;overflow-x:hidden;}

/* HEADER */
header{
  width:100%;background:rgba(13,40,24,0.95);
  border-bottom:1px solid rgba(255,255,255,0.1);
  position:sticky;top:0;z-index:100;
  padding:10px 14px;
  display:flex;flex-direction:column;gap:10px;
  backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
}
.row1{display:flex;align-items:center;gap:10px;width:100%;}
.logo-img{height:50px;width:auto;border-radius:8px;flex-shrink:0;}
.name-block{display:flex;flex-direction:column;gap:2px;}
.co-name{
  font-family:"Playfair Display",serif;
  font-size:1.35rem;font-weight:900;
  color:#ffffff;letter-spacing:0.02em;line-height:1.1;
  white-space:nowrap;
}
.co-tagline{
  font-size:0.62rem;font-weight:700;
  color:#FBDF80;letter-spacing:0.07em;
  text-transform:uppercase;
}
.row2{display:flex;align-items:center;gap:8px;width:100%;}
.icon-btn{
  display:flex;align-items:center;justify-content:center;
  width:44px;height:44px;border-radius:50%;
  border:1px solid rgba(255,255,255,0.15);
  background:rgba(255,255,255,0.08);
  font-size:1.2rem;text-decoration:none;
  flex-shrink:0;cursor:pointer;
  transition:all 0.3s ease;
}
.icon-btn:hover{background:rgba(255,255,255,0.15);border-color:rgba(255,255,255,0.3);}
.ig-btn{
  display:flex;align-items:center;gap:7px;
  padding:8px 16px;border-radius:22px;
  background:linear-gradient(135deg,#f09433,#e6683c,#dc2743,#cc2366,#bc1888);
  color:#fff;font-size:0.78rem;font-weight:700;
  text-decoration:none;white-space:nowrap;
  margin-left:auto;transition:opacity 0.3s;
}
.ig-btn:hover{opacity:0.85;}

/* HERO */
.hero{
  position:relative;width:100%;height:85vh;min-height:500px;
  overflow:hidden;
}
.hero-img{
  width:100%;height:100%;object-fit:cover;display:block;
  filter:brightness(0.45);
  transform:scale(1.02);
  animation:heroZoom 20s ease-in-out infinite alternate;
}
@keyframes heroZoom{
  0%{transform:scale(1.02) translateY(0);}
  100%{transform:scale(1.08) translateY(-1%);}
}
.hero-overlay{
  position:absolute;inset:0;
  background:linear-gradient(180deg,rgba(10,10,10,0.3) 0%,rgba(10,10,10,0.6) 50%,rgba(10,10,10,0.9) 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
.hero-tagline{
  font-family:"DM Sans",sans-serif;
  font-size:0.75rem;font-weight:600;
  letter-spacing:0.25em;text-transform:uppercase;
  color:#FBDF80;margin-bottom:1.5rem;
  opacity:0;animation:fadeUp 0.8s ease forwards 0.3s;
}
.hero-title{
  font-family:"Playfair Display",serif;
  font-size:clamp(2rem,5vw,3.8rem);font-weight:900;
  color:#fff;line-height:1.15;
  max-width:700px;margin-bottom:2rem;
  opacity:0;animation:fadeUp 0.8s ease forwards 0.5s;
}
.hero-title em{
  font-style:italic;color:#FBDF80;
}
.hero-cta{
  display:inline-flex;align-items:center;gap:10px;
  padding:16px 40px;border-radius:50px;
  background:#1a7a3a;
  color:#fff;font-family:"DM Sans",sans-serif;
  font-size:1rem;font-weight:700;
  text-decoration:none;letter-spacing:0.03em;
  border:none;cursor:pointer;
  transition:all 0.35s ease;
  box-shadow:0 4px 24px rgba(26,122,58,0.3);
  opacity:0;animation:fadeUp 0.8s ease forwards 0.7s;
}
.hero-cta:hover{
  background:#1e8c42;
  transform:translateY(-2px);
  box-shadow:0 8px 32px rgba(26,122,58,0.4);
}
.hero-cta svg{flex-shrink:0;}
@keyframes fadeUp{
  from{opacity:0;transform:translateY(20px);}
  to{opacity:1;transform:translateY(0);}
}

/* GALLERY SECTION */
.gallery-section{
  padding:3rem 1.5rem;
  max-width:1400px;margin:0 auto;
}
.section-label{
  font-family:"DM Sans",sans-serif;
  font-size:0.7rem;font-weight:600;
  letter-spacing:0.2em;text-transform:uppercase;
  color:#FBDF80;margin-bottom:0.5rem;
  text-align:center;
}
.section-title{
  font-family:"Playfair Display",serif;
  font-size:clamp(1.5rem,3vw,2.2rem);font-weight:700;
  color:#ffffff;text-align:center;margin-bottom:2.5rem;
}

/* MASONRY GRID */
.masonry{
  columns:4;column-gap:10px;
}
.masonry-item{
  break-inside:avoid;margin-bottom:10px;
  position:relative;overflow:hidden;
  border-radius:6px;cursor:pointer;
  background:#112e1c;
}
.masonry-item img{
  width:100%;display:block;
  transition:transform 0.5s cubic-bezier(0.25,0.46,0.45,0.94),filter 0.5s ease;
}
.masonry-item:hover img{
  transform:scale(1.05);
  filter:brightness(1.1);
}
.masonry-item .item-overlay{
  position:absolute;inset:0;
  background:linear-gradient(transparent 50%,rgba(10,10,10,0.7) 100%);
  opacity:0;transition:opacity 0.35s ease;
  display:flex;align-items:flex-end;justify-content:center;
  padding:12px;
}
.masonry-item:hover .item-overlay{opacity:1;}
.item-label{
  font-family:"DM Sans",sans-serif;
  font-size:0.72rem;font-weight:600;
  color:rgba(255,255,255,0.9);letter-spacing:0.06em;
}

/* FULLSCREEN */
.fs-overlay{
  display:none;position:fixed;inset:0;z-index:500;
  background:rgba(10,10,10,0.97);
  align-items:center;justify-content:center;
  backdrop-filter:blur(4px);
}
.fs-overlay.open{display:flex;}
#fsContent img{max-width:94vw;max-height:90vh;object-fit:contain;display:block;border-radius:4px;}
.fs-close{
  position:absolute;top:18px;right:18px;
  width:44px;height:44px;border-radius:50%;
  background:rgba(255,255,255,0.08);
  border:1px solid rgba(255,255,255,0.15);
  color:#fff;font-size:1.2rem;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  transition:all 0.3s ease;
}
.fs-close:hover{background:rgba(255,255,255,0.15);}
.like-btn{
  position:absolute;bottom:28px;left:50%;transform:translateX(-50%);
  padding:12px 28px;border-radius:50px;
  background:linear-gradient(135deg,#1a7a3a,#22a04a);
  color:#fff;font-family:"DM Sans",sans-serif;
  font-size:0.85rem;font-weight:700;
  border:none;cursor:pointer;z-index:510;
  white-space:nowrap;letter-spacing:0.03em;
  box-shadow:0 4px 20px rgba(26,122,58,0.35);
  transition:all 0.3s ease;
}
.like-btn:hover{transform:translateX(-50%) translateY(-2px);box-shadow:0 6px 28px rgba(26,122,58,0.5);}

/* FOOTER */
.site-footer{
  text-align:center;padding:2.5rem 1.5rem;
  border-top:1px solid rgba(255,255,255,0.1);
  color:rgba(255,255,255,0.5);
  font-size:0.75rem;letter-spacing:0.03em;
}

/* RESPONSIVE - TABLET */
@media(max-width:900px){
  .masonry{columns:3;}
}

/* RESPONSIVE - MOBILE */
@media(max-width:600px){
  .hero{height:70vh;min-height:400px;}
  .masonry{columns:2;column-gap:6px;}
  .masonry-item{margin-bottom:6px;border-radius:4px;}
  .gallery-section{padding:2rem 0.75rem;}
}

/* DESKTOP: collapse header to single row */
@media(min-width:601px){
  header{flex-direction:row;align-items:center;padding:10px 20px;gap:16px;}
  .row1{width:auto;flex-shrink:0;}
  .row2{width:auto;margin-left:auto;}
}
</style>

  {img:"images/palm_15.jpg"},{img:"images/palm_16.jpg"},{img:"sylvester.jpeg"}
];

const grid=document.getElementById("grid");
palms.forEach(function(p,i){
  var item=document.createElement("div");
  item.className="masonry-item";
  var img=document.createElement("img");
  img.src=p.img;img.alt="Sylvester Palm";img.loading="lazy";
  item.appendChild(img);
  var ov=document.createElement("div");
  ov.className="item-overlay";
  ov.innerHTML='<span class="item-label">View</span>';
  item.appendChild(ov);

  var isClick=false;
  item.addEventListener("mousedown",function(){isClick=true;});
  item.addEventListener("mousemove",function(){isClick=false;});
  item.addEventListener("mouseup",function(){if(isClick)openFS(i);isClick=false;});

  var holdTimer=null,taps=0,tapTimer=null;
  item.addEventListener("touchstart",function(){
    holdTimer=setTimeout(function(){holdTimer=null;openFS(i);},550);
  },{passive:true});
  item.addEventListener("touchmove",function(){if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}},{passive:true});
  item.addEventListener("touchend",function(){
    if(holdTimer){clearTimeout(holdTimer);holdTimer=null;}
    taps++;
    if(taps===1){tapTimer=setTimeout(function(){taps=0;},400);}
    else{clearTimeout(tapTimer);taps=0;openFS(i);}
  });
  grid.appendChild(item);
});

var currentFSIndex=-1;
function openFS(i){
  currentFSIndex=i;
  document.getElementById("fsContent").innerHTML='<img src="'+palms[i].img+'">';
  document.getElementById("fsOverlay").classList.add("open");
  document.body.style.overflow="hidden";
}
function closeFS(){
  document.getElementById("fsOverlay").classList.remove("open");
  currentFSIndex=-1;
  document.body.style.overflow="";
}
function likePhoto(){
  if(currentFSIndex<0)return;
  var imgSrc=palms[currentFSIndex].img;
  var photoRef=window.location.origin+"/"+imgSrc;
  var body=encodeURIComponent("I like this palm! "+photoRef);
  window.location.href="sms:+15619005658?body="+body;
}
document.getElementById("fsOverlay").addEventListener("click",function(e){if(e.target===document.getElementById("fsOverlay"))closeFS();});
document.addEventListener("keydown",function(e){if(e.key==="Escape")closeFS();});
</script>
</body>
